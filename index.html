<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, orientation=landscape">
    <title>osu! Mobile - V17 Gallery Edition</title>
    <style>
        :root { --osu-pink: #ff66aa; --osu-blue: #00e5ff; }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; height: 100vh; }
        #ui, #resultScreen { 
            position: absolute; z-index: 100; padding: 25px; background: rgba(10, 10, 20, 0.98); 
            border-radius: 30px; border: 4px solid var(--osu-pink); text-align: center;
            top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 800px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; box-shadow: 0 0 50px rgba(255, 102, 170, 0.6);
        }
        #resultScreen { display: none; grid-template-columns: 1fr; }
        .section { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 1px solid #444; }
        h3 { font-size: 13px; margin: 0 0 10px 0; color: var(--osu-blue); text-align: left; text-transform: uppercase; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 12px; border: 1px solid #555; background: #111; color: white; font-weight: bold; }
        button.start-btn { grid-column: span 2; background: var(--osu-pink); font-size: 26px; border: none; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        button.start-btn:active { transform: scale(0.96); }
        #gameContainer { position: relative; width: 100vw; height: 100vh; display: none; }
        /* ARKA PLAN BURADA DÜZELTİLDİ: Blur silindi, parlaklık artırıldı */
        #bgLayer { position: absolute; width: 100%; height: 100%; background-size: cover; background-position: center; filter: brightness(0.5); z-index: 1; }
        #gameCanvas { position: absolute; top: 0; left: 0; z-index: 2; width: 100%; height: 100%; }
        #hud { position: absolute; top: 0; left: 0; width: 100%; padding: 15px 40px; box-sizing: border-box; z-index: 10; pointer-events: none; }
        #healthContainer { width: 100%; height: 24px; background: rgba(0,0,0,0.7); border-radius: 12px; overflow: hidden; border: 2px solid #666; margin-bottom: 10px; box-shadow: 0 0 15px rgba(255, 102, 170, 0.3); }
        #healthBar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0055, var(--osu-pink), #fff); box-shadow: 0 0 20px var(--osu-pink); transition: 0.1s linear; }
        .info-text { font-size: 48px; font-weight: 900; text-shadow: 0 0 15px #000; }
        .grade-display { font-size: 130px; font-weight: 900; margin: 15px 0; text-shadow: 0 0 40px var(--osu-pink); }
    </style>
</head>
<body>
<div id="ui">
    <h1 style="grid-column: span 2; color: var(--osu-pink); margin: 0; text-shadow: 0 0 20px var(--osu-pink);">V17 GALLERY</h1>
    <div class="section">
        <h3>1. HARİTA & ARKA PLAN</h3>
        <select id="mapSelect">
            <option value="8|dlFA0Zq1k2g">Silhouette (8⭐)</option>
            <option value="9|v8bZVdTgXoY">Kaikai Kitan (9⭐)</option>
            <option value="10|fhzKLBZJC3w">SPECIALZ (10⭐)</option>
        </select>
        <input type="text" id="customBG" placeholder="YouTube Link (Opsiyonel)">
        <p style="font-size: 10px; margin: 5px 0; color: #aaa;">VEYA GALERİDEN SEÇ:</p>
        <input type="file" id="bgUpload" accept="image/*">
    </div>
    <div class="section">
        <h3>2. MÜZİK & ZORLUK (1-10)</h3>
        <select id="audioSource" onchange="toggleSource()">
            <option value="mp3">MP3 Dosyası Seç</option>
            <option value="sc">SoundCloud Linki</option>
        </select>
        <input type="file" id="musicUpload" accept="audio/*, .mp3, .wav, .m4a">
        <input type="text" id="scInput" placeholder="SoundCloud URL" style="display:none;">
        <select id="manualDiff">
            <option value="1">⭐ 1 Yıldız</option><option value="2">⭐⭐ 2 Yıldız</option><option value="3">⭐⭐⭐ 3 Yıldız</option>
            <option value="4">⭐⭐⭐⭐ 4 Yıldız</option><option value="5" selected>⭐⭐⭐⭐⭐ 5 Yıldız</option>
            <option value="6">⭐⭐⭐⭐⭐⭐ 6 Yıldız</option><option value="7">⭐⭐⭐⭐⭐⭐⭐ 7 Yıldız</option>
            <option value="8">⭐⭐⭐⭐⭐⭐⭐⭐ 8 Yıldız</option><option value="9">⭐⭐⭐⭐⭐⭐⭐⭐⭐ 9 Yıldız</option>
            <option value="10">🔥🔥 10 YILDIZ (HAKİKİ ZOR)</option>
        </select>
    </div>
    <button class="start-btn" onclick="startGame()">SİSTEMİ BAŞLAT</button>
</div>
<div id="resultScreen">
    <h2 id="resStatus">TAMAMLANDI</h2><span id="finalGrade" class="grade-display">S</span>
    <div id="stats" style="font-size: 26px;">Kombo: <span id="resCombo" style="color:var(--osu-pink)">0</span></div>
    <button onclick="location.reload()" style="background:var(--osu-pink); font-size: 22px; padding: 15px;">TEKRAR DENE</button>
</div>
<div id="gameContainer">
    <div id="bgLayer"></div>
    <div id="hud">
        <div id="healthContainer"><div id="healthBar"></div></div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div onclick="location.reload()" style="pointer-events:auto; cursor:pointer; background:rgba(255,255,255,0.2); padding:12px 24px; border-radius:18px; font-weight:bold; border: 1px solid white;">MENÜ</div>
            <div class="info-text"><span id="combo">0</span>x</div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>
<div id="scPlayer" style="position:fixed; bottom:-500px; opacity:0;"></div>
<script>
    const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
    const comboEl = document.getElementById('combo'); const healthBar = document.getElementById('healthBar');
    let circles = [], effects = [], hitTexts = [], difficulty = 5, combo = 0, maxCombo = 0, gameActive = false, lastTime = 0, spawnTimer = 0, health = 100, audio = new Audio(), drainOn = false; 

    function toggleSource() {
        const source = document.getElementById('audioSource').value;
        document.getElementById('musicUpload').style.display = source === 'mp3' ? 'block' : 'none';
        document.getElementById('scInput').style.display = source === 'sc' ? 'block' : 'none';
    }

    function startGame() {
        const source = document.getElementById('audioSource').value;
        const fileInput = document.getElementById('musicUpload');
        const bgUpload = document.getElementById('bgUpload');
        
        if (source === 'mp3' && fileInput.files[0]) {
            audio.src = URL.createObjectURL(fileInput.files[0]);
            audio.play().catch(e => alert("Hata: " + e.message));
        } else if (source === 'sc') {
            const url = document.getElementById('scInput').value;
            document.getElementById('scPlayer').innerHTML = `<iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&auto_play=true"></iframe>`;
        } else { alert("Şarkı seç reis!"); return; }

        difficulty = parseInt(document.getElementById('manualDiff').value);
        
        if(bgUpload.files[0]) {
            document.getElementById('bgLayer').style.backgroundImage = `url('${URL.createObjectURL(bgUpload.files[0])}')`;
        } else {
            let mapData = document.getElementById('mapSelect').value.split('|');
            document.getElementById('bgLayer').style.backgroundImage = `url('https://i.ytimg.com/vi/${mapData[1]}/maxresdefault.jpg')`;
        }

        document.getElementById('ui').style.display = 'none';
        document.getElementById('gameContainer').style.display = 'block';
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        gameActive = true; health = 100; drainOn = false;
        requestAnimationFrame(gameLoop);
    }

    function endGame(status) {
        if(!gameActive) return;
        gameActive = false; audio.pause();
        document.getElementById('gameContainer').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'grid';
        document.getElementById('resStatus').innerText = status;
        let grade = health > 0 ? (maxCombo > 150 ? "SS" : (maxCombo > 70 ? "S" : "A")) : "F";
        document.getElementById('finalGrade').innerText = grade;
        document.getElementById('resCombo').innerText = maxCombo;
    }

    function gameLoop(time) {
        if(!gameActive) return;
        const dt = time - lastTime; lastTime = time;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if(audio.duration > 0 && audio.currentTime >= audio.duration - 0.2) endGame("TAMAMLANDI");

        if (drainOn) {
            health -= 0.0055 * dt * (difficulty * 0.4);
            healthBar.style.width = health + "%";
            if(health <= 0) endGame("ELENDİN!");
        }

        spawnTimer += dt;
        if(spawnTimer >= 1000 / (difficulty * 0.95 + 1)) {
            const r = 62 - (difficulty * 2.3);
            circles.push({ x: Math.random()*(canvas.width-r*2)+r, y: Math.random()*(canvas.height-r*2)+r, r, approach: 2.8 });
            spawnTimer = 0;
        }

        circles.forEach((c, i) => {
            ctx.beginPath(); ctx.arc(c.x, c.y, c.r * c.approach, 0, Math.PI*2); ctx.strokeStyle = "rgba(255,255,255,0.6)"; ctx.lineWidth = 3; ctx.stroke();
            ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2); ctx.fillStyle = "#ff66aa"; ctx.fill(); ctx.strokeStyle = "#fff"; ctx.lineWidth = 4; ctx.stroke();
            c.approach -= 0.0026 * dt * (difficulty * 0.2);
            if(c.approach <= 1) { 
                hitTexts.push({ x: c.x, y: c.y, txt: "MISS", col: "#ff4444", a: 1, yO: 0 });
                circles.splice(i,1); combo = 0; comboEl.innerText = combo; health -= 14; drainOn = true;
            }
        });

        hitTexts.forEach((ht, i) => {
            ctx.fillStyle = ht.col; ctx.font = "bold 45px Arial"; ctx.textAlign = "center"; ctx.globalAlpha = ht.a; 
            ctx.fillText(ht.txt, ht.x, ht.y - ht.yO); ctx.globalAlpha = 1; ht.yO += 2; ht.a -= 0.04; if(ht.a <= 0) hitTexts.splice(i,1);
        });

        effects.forEach((e, i) => {
            ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.strokeStyle = `rgba(255,255,255,${e.a})`; ctx.lineWidth = 5; ctx.stroke();
            e.r += 4; e.a -= 0.08; if(e.a <= 0) effects.splice(i,1);
        });
        requestAnimationFrame(gameLoop);
    }

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault(); const t = e.touches[0];
        circles.forEach((c, i) => {
            if(Math.hypot(c.x - t.clientX, c.y - t.clientY) < c.r * 1.9) {
                drainOn = true; let msg = "PERFECT", col = "#fff";
                if(c.approach > 1.5) { msg = "GOOD"; col = "#66ff66"; health += 5; }
                else if(c.approach > 1.25) { msg = "PERFECT"; col = "#fff"; health += 10; }
                else { msg = "MEH"; col = "#ffcc00"; health += 3; }
                hitTexts.push({ x: c.x, y: c.y, txt: msg, col, a: 1, yO: 0 });
                effects.push({ x: c.x, y: c.y, r: c.r, a: 1 });
                circles.splice(i,1); combo++; if(combo > maxCombo) maxCombo = combo;
                comboEl.innerText = combo; health = Math.min(100, health);
            }
        });
    });
</script>
</body>
</html>
