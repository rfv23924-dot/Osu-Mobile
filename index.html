<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, orientation=landscape">
    <title>osu! Mobile - V11 True Ultimate</title>
    <style>
        :root { --osu-pink: #ff66aa; --osu-blue: #00e5ff; }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; height: 100vh; }
        
        #ui, #resultScreen { 
            position: absolute; z-index: 100; padding: 25px; background: rgba(5, 5, 15, 0.98); 
            border-radius: 25px; border: 3px solid var(--osu-pink); text-align: center;
            top: 50%; left: 50%; transform: translate(-50%, -50%); width: 92%; max-width: 800px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; box-shadow: 0 0 30px rgba(255, 102, 170, 0.4);
        }
        #resultScreen { display: none; grid-template-columns: 1fr; }
        
        .section { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 1px solid #444; }
        h3 { font-size: 14px; margin-top: 0; color: var(--osu-blue); text-align: left; text-transform: uppercase; }

        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #555; background: #111; color: white; font-size: 14px; outline: none; }
        button.start-btn { grid-column: span 2; background: var(--osu-pink); color: white; font-weight: bold; font-size: 22px; cursor: pointer; border: none; margin-top: 10px; }

        #gameContainer { position: relative; width: 100vw; height: 100vh; display: none; }
        #bgLayer { position: absolute; width: 100%; height: 100%; background-size: cover; background-position: center; filter: brightness(0.2) blur(3px); z-index: 1; }
        #gameCanvas { position: absolute; top: 0; left: 0; z-index: 2; width: 100%; height: 100%; }
        
        #hud { position: absolute; top: 0; left: 0; width: 100%; padding: 10px 40px; box-sizing: border-box; z-index: 10; display: flex; flex-direction: column; pointer-events: none; }
        #healthContainer { width: 100%; height: 100%; max-height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; margin-bottom: 10px; border: 1px solid #333; }
        #healthBar { width: 100%; height: 100%; background: linear-gradient(90deg, var(--osu-pink), #ff99cc); transition: 0.1s linear; }
        
        #topBar { display: flex; justify-content: space-between; align-items: center; width: 100%; pointer-events: none; }
        #pauseBtn { pointer-events: auto; background: rgba(255,255,255,0.15); padding: 6px 18px; border-radius: 20px; border: 1px solid #fff; cursor: pointer; font-weight: bold; }
        
        .grade-display { font-size: 110px; font-weight: 900; margin: 15px 0; }
        .ss { color: #fff; text-shadow: 0 0 40px gold; } .s { color: gold; } .a { color: #4caf50; } .f { color: #f44336; }
    </style>
</head>
<body>

<div id="ui">
    <h1 style="grid-column: span 2; color: var(--osu-pink); letter-spacing: 3px;">V11 TRUE ULTIMATE</h1>
    
    <div class="section">
        <h3>1. BEATMAP & BG</h3>
        <select id="mapSelect">
            <option value="8|dlFA0Zq1k2g">Silhouette (8⭐)</option>
            <option value="9|v8bZVdTgXoY">Kaikai Kitan (9⭐)</option>
            <option value="10|fhzKLBZJC3w">SPECIALZ (10⭐)</option>
        </select>
        <input type="text" id="customBG" placeholder="YouTube BG Link (Opsiyonel)">
    </div>

    <div class="section">
        <h3>2. ZORLUK SEVİYESİ</h3>
        <select id="audioSource" onchange="toggleSource()">
            <option value="mp3">Müzik Yükle (MP3)</option>
            <option value="sc">SoundCloud Linki</option>
        </select>
        <input type="file" id="musicUpload" accept="audio/*">
        <input type="text" id="scInput" placeholder="https://soundcloud.com/..." style="display:none;">
        
        <select id="manualDiff">
            <option value="1">⭐ 1 Yıldız (Çok Kolay)</option>
            <option value="2">⭐⭐ 2 Yıldız</option>
            <option value="3">⭐⭐⭐ 3 Yıldız</option>
            <option value="4">⭐⭐⭐⭐ 4 Yıldız</option>
            <option value="5" selected>⭐⭐⭐⭐⭐ 5 Yıldız (Normal)</option>
            <option value="6">⭐⭐⭐⭐⭐⭐ 6 Yıldız</option>
            <option value="7">⭐⭐⭐⭐⭐⭐⭐ 7 Yıldız</option>
            <option value="8">⭐⭐⭐⭐⭐⭐⭐⭐ 8 Yıldız</option>
            <option value="9">⭐⭐⭐⭐⭐⭐⭐⭐⭐ 9 Yıldız</option>
            <option value="10">🔥🔥 10 YILDIZ (GOD MODE)</option>
        </select>
    </div>

    <button class="start-btn" onclick="startGame()">SİSTEMİ BAŞLAT</button>
</div>

<div id="resultScreen">
    <h2 id="resStatus" style="color:var(--osu-blue)">OYUN BİTTİ</h2>
    <span id="finalGrade" class="grade-display">A</span>
    <div id="stats" style="font-size: 22px;">Max Combo: <span id="resCombo" style="color:var(--osu-pink)">0</span></div>
    <button onclick="location.reload()" style="background:var(--osu-pink); font-weight:bold; margin-top:25px;">YENİDEN DENE</button>
</div>

<div id="gameContainer">
    <div id="bgLayer"></div>
    <div id="hud">
        <div id="healthContainer"><div id="healthBar"></div></div>
        <div id="topBar">
            <div id="pauseBtn" onclick="quitGame()">DURDUR</div>
            <div style="font-size:35px; font-weight:900;"><span id="combo">0</span>x</div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<div id="scPlayer" style="position:fixed; bottom:-500px; opacity:0;"></div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const comboEl = document.getElementById('combo');
    const healthBar = document.getElementById('healthBar');
    
    let circles = [], effects = [], difficulty = 5, combo = 0, maxCombo = 0, gameActive = false, lastTime = 0, spawnTimer = 0, health = 100, audio = new Audio();

    function toggleSource() {
        const source = document.getElementById('audioSource').value;
        document.getElementById('musicUpload').style.display = source === 'mp3' ? 'block' : 'none';
        document.getElementById('scInput').style.display = source === 'sc' ? 'block' : 'none';
    }

    function quitGame() { if(confirm("Menüye dönmek istiyor musun?")) { audio.pause(); endGame("DURDURULDU"); } }

    function startGame() {
        const source = document.getElementById('audioSource').value;
        if (source === 'mp3' && document.getElementById('musicUpload').files[0]) {
            audio.src = URL.createObjectURL(document.getElementById('musicUpload').files[0]);
            audio.play();
        } else if (source === 'sc') {
            const url = document.getElementById('scInput').value;
            document.getElementById('scPlayer').innerHTML = `<iframe id="scFrame" width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&auto_play=true"></iframe>`;
        } else { alert("Önce müzik seçmelisin!"); return; }

        difficulty = parseInt(document.getElementById('manualDiff').value);
        let mapData = document.getElementById('mapSelect').value.split('|');
        let bgUrl = `https://i.ytimg.com/vi/${mapData[1]}/maxresdefault.jpg`;
        const customBG = document.getElementById('customBG').value;
        if(customBG) {
            let vid = customBG.includes('v=') ? customBG.split('v=')[1].split('&')[0] : customBG.split('be/')[1];
            if(vid) bgUrl = `https://i.ytimg.com/vi/${vid}/maxresdefault.jpg`;
        }

        document.getElementById('bgLayer').style.backgroundImage = `url('${bgUrl}')`;
        document.getElementById('ui').style.display = 'none';
        document.getElementById('gameContainer').style.display = 'block';
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        gameActive = true; health = 100;
        audio.onended = () => endGame("TAMAMLANDI");
        requestAnimationFrame(gameLoop);
    }

    function endGame(status) {
        gameActive = false;
        document.getElementById('gameContainer').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'grid';
        document.getElementById('resStatus').innerText = status;
        
        let grade = "F"; 
        if(maxCombo >= 200) grade = "SS"; else if(maxCombo >= 100) grade = "S"; 
        else if(maxCombo >= 50) grade = "A"; else if(maxCombo >= 20) grade = "B";
        
        const gradeEl = document.getElementById('finalGrade');
        gradeEl.innerText = grade;
        gradeEl.className = "grade-display " + grade.toLowerCase();
        document.getElementById('resCombo').innerText = maxCombo;
    }

    function gameLoop(time) {
        if(!gameActive) return;
        const dt = time - lastTime; lastTime = time;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // HP Sızıntısı
        health -= 0.0035 * dt * (difficulty * 0.45);
        healthBar.style.width = health + "%";
        if(health <= 0) { audio.pause(); endGame("ELENDİN (FAILED)"); }

        spawnTimer += dt;
        if(spawnTimer >= 1000 / (difficulty * 0.85 + 1)) {
            const r = 62 - (difficulty * 2.2);
            circles.push({ x: Math.random()*(canvas.width-r*2)+r, y: Math.random()*(canvas.height-r*2)+r, r, approach: 2.7 });
            spawnTimer = 0;
        }

        circles.forEach((c, i) => {
            // Dış Halka
            ctx.beginPath(); ctx.arc(c.x, c.y, c.r * c.approach, 0, Math.PI*2);
            ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.lineWidth = 2; ctx.stroke();
            
            // İç Daire
            ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2);
            ctx.fillStyle = "#ff66aa"; ctx.fill();
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 4; ctx.stroke();
            
            c.approach -= 0.0019 * dt * (difficulty * 0.22);
            if(c.approach <= 1) { 
                circles.splice(i,1); combo = 0; comboEl.innerText = combo; health -= 12; 
            }
        });

        effects.forEach((e, i) => {
            ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
            ctx.strokeStyle = `rgba(255,255,255,${e.a})`; ctx.lineWidth = 3; ctx.stroke();
            e.r += 2.5; e.a -= 0.06;
            if(e.a <= 0) effects.splice(i,1);
        });
        requestAnimationFrame(gameLoop);
    }

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const t = e.touches[0];
        circles.forEach((c, i) => {
            if(Math.hypot(c.x - t.clientX, c.y - t.clientY) < c.r * 1.7) {
                effects.push({ x: c.x, y: c.y, r: c.r, a: 1 });
                circles.splice(i,1); combo++; if(combo > maxCombo) maxCombo = combo;
                comboEl.innerText = combo; health = Math.min(100, health + 4.5);
            }
        });
    });
</script>
</body>
</html>
